<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <pattern id="checker" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="10" height="10" fill="#f5f5f5"/>
      <rect x="10" y="0" width="10" height="10" fill="#e8e8e8"/>
      <rect x="0" y="10" width="10" height="10" fill="#e8e8e8"/>
      <rect x="10" y="10" width="10" height="10" fill="#f5f5f5"/>
    </pattern>
    <linearGradient id="product" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#ef5d36"/>
      <stop offset="100%" stop-color="#cb4723"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#checker)"/>
  <!-- Product - sneaker shape (same as before, no background) -->
  <ellipse cx="400" cy="280" rx="180" ry="80" fill="url(#product)" opacity="0.9"/>
  <ellipse cx="400" cy="260" rx="160" ry="60" fill="#f07a56"/>
  <rect x="240" y="250" width="320" height="30" rx="15" fill="#fff" opacity="0.3"/>
  <!-- Label -->
  <text x="400" y="440" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#999" opacity="0.6">Background removed — transparent PNG</text>
</svg>
