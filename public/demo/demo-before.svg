<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8ddd0"/>
      <stop offset="100%" stop-color="#d4c5b3"/>
    </linearGradient>
    <linearGradient id="product" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#ef5d36"/>
      <stop offset="100%" stop-color="#cb4723"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Desk surface -->
  <rect x="0" y="320" width="800" height="180" fill="#c4b5a1" rx="0"/>
  <!-- Product - sneaker shape -->
  <ellipse cx="400" cy="280" rx="180" ry="80" fill="url(#product)" opacity="0.9"/>
  <ellipse cx="400" cy="260" rx="160" ry="60" fill="#f07a56"/>
  <rect x="240" y="250" width="320" height="30" rx="15" fill="#fff" opacity="0.3"/>
  <!-- Shadow -->
  <ellipse cx="400" cy="360" rx="160" ry="20" fill="rgba(0,0,0,0.08)"/>
  <!-- Label -->
  <text x="400" y="440" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#62584d" opacity="0.6">Sample product photo with background</text>
</svg>
